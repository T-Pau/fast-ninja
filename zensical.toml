# cspell: ignore fontawesome inlinehilite linenums mkdocstrings pymdownx pygments superfences

[project]
site_name = "fast-ninja"
site_url = "https://fast-ninja.tpau.group/"
repo_url = "https://github.com/T-Pau/fast-ninja"
copyright = "©2026 Dieter Baron"
site_author = "Dieter Baron"
site_description = "Light-weight Build System Based on Ninja."

nav = [
   { "fast-ninja" = "index.md" },
   { "Tutorials" = [
       { "index.md" =  "Tutorials/index.md" }
   ]},
   { "How-To-Guides" = [
       { "index.md" =  "How-To-Guides/index.md" }
   ]},
   { "Reference" = [
       { "index.md" =  "Reference/index.md" }
   ]},
   { "Explanations" = [
       { "index.md" =  "Explanations/index.md" }
   ]},
   { "License" = "License.md" },
   { "Repository" = "https://github.com/T-Pau/fast-ninja" }
]

extra_css = [
    "assets/styles/style.css",
    "assets/styles/tpau.css",
]


[project.extra]
generator = false
icons = { "external" = "octicons/link-external-16" }


[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options.custom_icons = ["overrides/.icons"]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.zensical.extensions.macros]


[project.theme]
custom_dir = "docs/.overrides"
favicon = "assets/images/favicon.ico"
font = false
#logo: assets/images/logo.svg
features = [
     "navigation.indexes",
     "toc.integrate"
]

[project.theme.icon]
logo = "tpau/icon"
repo = "fontawesome/brands/github"
admonition = { "todo" = "fontawesome/solid/tools" }

[project.theme.palette]
primary = "custom"
